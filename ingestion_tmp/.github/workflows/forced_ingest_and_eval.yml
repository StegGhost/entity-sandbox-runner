name: Forced Ingest and Evaluate v20.1

on:
  workflow_dispatch:
    inputs:
      run_type:
        description: "Desired experiment run type"
        required: false
        default: "adaptive_v20"
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run forced ingestion and preflighted evaluation
        env:
          RUN_TYPE: ${{ github.event.inputs.run_type || 'adaptive_v20' }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python experiments/evaluation_suite/run_eval.py

      - name: Commit governed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add logs payload incoming_bundles installed_bundles failed_bundles .github/workflows config install experiments || true
          git commit -m "v20.1 preflighted autonomous evaluation" || echo "no change"
          git push
