name: Self Improving Governed Loop

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  governed-loop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync repo
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${PYTHONPATH}:$(pwd)" >> $GITHUB_ENV

      - name: Generate bundle
        run: python engine/self_improve_runner.py

      - name: Show bundles
        run: ls -la incoming_bundles || true

      - name: Run ingestion
        run: |
          python engine/ingest_runner.py > ingest_result.json || true
          cat ingest_result.json || true

      - name: Select retry trajectory
        run: |
          python engine/trajectory_retry_selector_v10.py             --ingest ingest_result.json             --receipts receipt_chain.json             --out retry_decision.json
          cat retry_decision.json

      - name: Export retry decision
        run: |
          python - <<'PY'
          import json
          import os
          with open("retry_decision.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"INGEST_STATUS={data.get('ingest_status', 'unknown')}\n")
              env.write(f"RETRY_ACTION={data.get('selected_action', 'none')}\n")
          PY
        env:
          GITHUB_ENV: ${{ env.GITHUB_ENV }}

      - name: Run self-heal and rebuild
        if: env.INGEST_STATUS == 'failed' && env.RETRY_ACTION == 'repair_and_retry'
        run: |
          python engine/self_heal_runner_v6.py ingest_result.json > heal_output.json || true
          cat heal_output.json || true
          python engine/rebuild_bundle_from_heal.py heal_output.json

      - name: Retry ingestion after repair
        if: env.INGEST_STATUS == 'failed' && env.RETRY_ACTION == 'repair_and_retry'
        run: |
          python engine/ingest_runner.py > ingest_retry.json || true
          cat ingest_retry.json || true

      - name: Safe retry without rebuild
        if: env.INGEST_STATUS == 'failed' && env.RETRY_ACTION == 'safe_retry'
        run: |
          python engine/ingest_runner.py > ingest_retry.json || true
          cat ingest_retry.json || true

      - name: Final validation
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          candidate = "ingest_retry.json" if Path("ingest_retry.json").exists() else "ingest_result.json"
          final_status = "failed"
          try:
              with open(candidate, "r", encoding="utf-8") as f:
                  data = json.load(f)
              final_status = data.get("status", "failed")
          except Exception:
              final_status = "failed"

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"FINAL_STATUS={final_status}\n")
          print({"result_file": candidate, "final_status": final_status})
          PY
        env:
          GITHUB_ENV: ${{ env.GITHUB_ENV }}

      - name: Commit valid state
        if: env.FINAL_STATUS == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          git add incoming_bundles || true
          git add receipt_chain.json || true
          git add ingest_result.json ingest_retry.json retry_decision.json heal_output.json || true

          git diff --cached --quiet || git commit -m "governed-loop: trajectory-aware valid state"
          git push

      - name: Stop on unsafe trajectory
        if: env.FINAL_STATUS != 'success'
        run: |
          echo "Trajectory-aware retry declined or failed. Manual escalation required."
          exit 1
