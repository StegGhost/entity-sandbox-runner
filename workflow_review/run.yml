
name: Strict Run (Gatekeeper)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gatekeeper - Force Ingestion
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python install/ingestion_v2.py

      - name: Gatekeeper - Preflight Strict
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python install/preflight_strict.py

      - name: Execute Evaluation
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python experiments/evaluation_suite/run_eval.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git commit -m "strict run update" || echo "no changes"
          git push
