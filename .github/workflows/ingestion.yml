name: Ingestion Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run ingestion
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python install/ingestion_v2.py

      - name: Commit ingestion changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          git add .

          git diff --cached --quiet || git commit -m "ingestion: applied bundle updates"

          git push
