name: Ingestion Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force latest repo state
        run: |
          git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug incoming bundles
        run: |
          echo "PWD:"
          pwd
          echo "Incoming:"
          ls -la incoming_bundles || echo "missing dir"

      - name: Run ingestion
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python install/ingestion_v2.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git commit -m "ingestion update" || echo "no changes"
          git push
