name: Bundle Orchestrator

on:
  workflow_dispatch:
  push:
    paths:
      - "incoming_bundles/*.zip"

permissions:
  contents: write

concurrency:
  group: bundle-orchestrator
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        shell: bash
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run bundle orchestrator
        shell: bash
        run: |
          python ingestion/orchestrator.py

      - name: Commit repository changes
        shell: bash
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # EXCLUDE protected workflow files
          git add . ':!.github/workflows/*'

          git commit -m "Apply bundle installation" || echo "Nothing to commit"
          git push || echo "Push skipped (likely protected path)"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Bundle orchestrator applied updates"
          git pull --rebase origin main || true
          git push

      - name: Upload ingestion artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-artifacts
          path: |
            ingestion_reports
            ingestion_backups
            workflow_review
            workflow_replace
            workflow_deprecated
            installed_bundles
            failed_bundles
            runtime_backups
          if-no-files-found: warn
