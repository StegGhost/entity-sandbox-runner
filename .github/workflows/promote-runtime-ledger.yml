name: Promote Runtime Ledger

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promote-runtime-ledger
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run runtime ledger promotion
        shell: bash
        run: |
          python install/install_runtime_ledger.py

      - name: Commit promoted files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Promote runtime ledger payload"
          git pull --rebase origin main || true
          git push

      - name: Upload promotion artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-ledger-promotion-artifacts
          path: |
            evidence_plane
            observatory
            security_plane
            receipts
          if-no-files-found: warn
