name: Bootstrap Workflow Promoter

on:
  push:
    paths:
      - "payload/workflows/**"
      - "install/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Promote staged workflows
        run: |
          mkdir -p .github/workflows
          if [ -d "payload/workflows" ]; then
            cp payload/workflows/*.yml .github/workflows/ || true
          fi

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows || true
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Bootstrap promote workflows"
            git push
          fi
