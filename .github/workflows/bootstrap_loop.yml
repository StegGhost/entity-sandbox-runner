name: Bootstrap Loop

on:
  workflow_dispatch:

jobs:
  run-bootstrap-loop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (if present)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Manual only notice
        run: |
          echo "bootstrap_loop.yml schedule disabled."
          echo "Authoritative live path is:"
          echo "Brain Sync -> Ingestion Pipeline -> Reconciliation"
          echo "Run this workflow manually only if explicitly needed."
