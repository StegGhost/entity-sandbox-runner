name: Test + Failure Feedback

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test-and-feedback:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force latest repo state
        run: |
          git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=${PYTHONPATH}:$(pwd)" >> $GITHUB_ENV

      - name: Ensure log directories
        run: |
          mkdir -p logs incoming_bundles

      - name: Run pytest
        id: pytest
        continue-on-error: true
        run: |
          pytest -q > logs/latest_failure.txt 2>&1 || true

      - name: Show failures
        run: |
          echo "---- FAILURE OUTPUT ----"
          cat logs/latest_failure.txt || echo "no failures"

      - name: Run stabilized feedback loop
        run: |
          python - <<EOF
            from engine.failure_feedback import load_failure_text
            from engine.self_improve_runner import run_self_improve

             failure_text = load_failure_text()
             result = run_self_improve(".", failure_text=failure_text)

             print(result)
             EOF

      - name: Show generated bundles
        run: |
          echo "INCOMING_BUNDLES AFTER FEEDBACK:"
          ls -la incoming_bundles || true
          echo "FEEDBACK STATE:"
          cat logs/feedback_state.json || echo "no feedback state"

      - name: Commit feedback artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          git add incoming_bundles logs || true

          git diff --cached --quiet || git commit -m "feedback: stabilized bundle generation"

          git push
