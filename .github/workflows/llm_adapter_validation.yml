name: LLM Adapter Validation

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "decision_engine.py"
      - "governed_executor.py"
      - "api_server.py"
      - "install/tool_contracts.py"
      - "install/llm_gateway.py"
      - "install/llm_adapter.py"
      - "install/proposal_adapter.py"
      - "install/agent_registry.py"
      - "install/test_llm_adapter.py"
      - "test_decision_engine.py"
      - "test_api.py"
      - "test_replay_system.py"
      - ".github/workflows/llm_adapter_validation.yml"

jobs:
  validate-llm-adapter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pytest httpx

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)/install" >> $GITHUB_ENV

      # -------------------------------------------------
      # HARD RESET FUNCTION (inline)
      # -------------------------------------------------
      - name: Define clean_receipts helper
        run: |
          echo 'function clean_receipts() {' >> clean.sh
          echo '  rm -rf receipts receipts_node_a receipts_node_b || true' >> clean.sh
          echo '  mkdir -p receipts' >> clean.sh
          echo '}' >> clean.sh

      # -------------------------------------------------
      # RUN TESTS WITH FULL ISOLATION
      # -------------------------------------------------

      - name: Run test_decision_engine
        run: |
          source clean.sh
          clean_receipts
          python -m pytest -q test_decision_engine.py

      - name: Run test_api
        run: |
          source clean.sh
          clean_receipts
          python -m pytest -q test_api.py

      - name: Run llm adapter tests
        run: |
          source clean.sh
          clean_receipts
          python -m pytest -q install/test_llm_adapter.py

      - name: Run replay system tests (isolated)
        run: |
          source clean.sh
          clean_receipts
          python -m pytest -q test_replay_system.py
