name: LLM Adapter Validation

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "decision_engine.py"
      - "governed_executor.py"
      - "api_server.py"
      - "install/tool_contracts.py"
      - "install/llm_gateway.py"
      - "install/llm_adapter.py"
      - "install/proposal_adapter.py"
      - "install/agent_registry.py"
      - "install/test_llm_adapter.py"
      - "test_decision_engine.py"
      - "test_api.py"
      - ".github/workflows/llm_adapter_validation.yml"

jobs:
  validate-llm-adapter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pytest httpx

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)/install" >> $GITHUB_ENV

      - name: Clean receipts
        run: rm -rf receipts receipts_node_a receipts_node_b || true

      - name: Run all tests
        run: |
          python -m pytest -q \
            test_decision_engine.py \
            test_api.py \
            install/test_llm_adapter.py \
            test_replay_system.py
