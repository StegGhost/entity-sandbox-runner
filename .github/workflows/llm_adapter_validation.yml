name: LLM Adapter Validation

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  validate-llm-adapter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pytest httpx

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)/install" >> $GITHUB_ENV

      - name: Clean receipts
        run: rm -rf receipts receipts_node_a receipts_node_b || true

      - name: Run all tests
        run: python -m pytest -q test_decision_engine.py test_api.py install/test_llm_adapter.py
