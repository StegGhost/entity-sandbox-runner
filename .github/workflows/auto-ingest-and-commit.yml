name: Auto Ingest And Commit

on:
  workflow_dispatch:
    inputs:
      bundle_path:
        description: "Optional path to bundle zip, e.g. incoming_bundles/my_bundle.zip"
        required: false
        default: ""
  push:
    paths:
      - "incoming_bundles/*.zip"

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve bundle path
        id: resolve
        shell: bash
        run: |
          INPUT_PATH="${{ github.event.inputs.bundle_path }}"
          if [ -n "$INPUT_PATH" ]; then
            echo "bundle_path=$INPUT_PATH" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          AUTO_PATH=$(python ingestion/find_latest_bundle.py)
          echo "bundle_path=$AUTO_PATH" >> "$GITHUB_OUTPUT"

      - name: Show resolved bundle
        shell: bash
        run: |
          echo "Resolved bundle: ${{ steps.resolve.outputs.bundle_path }}"
          if [ -z "${{ steps.resolve.outputs.bundle_path }}" ]; then
            echo "No bundle found in incoming_bundles/"
            exit 1
          fi
          if [ ! -f "${{ steps.resolve.outputs.bundle_path }}" ]; then
            echo "Bundle file not found: ${{ steps.resolve.outputs.bundle_path }}"
            exit 1
          fi

      - name: Run ingestion tool
        run: |
          python ingestion/ingest_bundle.py "${{ steps.resolve.outputs.bundle_path }}"

      - name: Commit and push applied bundle changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No repository changes to commit."
            exit 0
          fi

          BUNDLE_NAME=$(basename "${{ steps.resolve.outputs.bundle_path }}")
          git commit -m "Apply bundle: ${BUNDLE_NAME}"
          git push

      - name: Upload ingestion logs and backups
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-artifacts
          path: |
            ingestion_reports
            ingestion_backups
          if-no-files-found: warn
