name: Goal Directed Execution

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run goal directed execution
        run: |
          python install/goal_directed_execution.py

      - name: Show outputs
        run: |
          ls -R payload/runtime || true

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add payload/runtime || true
          git commit -m "goal directed execution update" || echo "no changes"
          git push
