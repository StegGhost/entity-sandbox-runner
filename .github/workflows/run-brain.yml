name: Run Brain

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run brain
        id: run_brain
        continue-on-error: true
        run: python internal_brain/brain_runner.py

      - name: Show brain report
        if: always()
        run: cat internal_brain/brain_report.json

      # ✅ Persist the report to repo so you can see it on iPhone
      - name: Save brain report to repo
        if: always()
        run: |
          mkdir -p brain_reports
          cp internal_brain/brain_report.json brain_reports/brain_report_latest.json

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add brain_reports/brain_report_latest.json
          git commit -m "update brain report" || echo "no changes"
          git push

      - name: Trigger ingestion workflow
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json, os, subprocess, sys

          repo = os.environ["REPO"]

          def sh(cmd):
              return subprocess.check_output(cmd, text=True)

          data = json.loads(sh(["gh","api",f"/repos/{repo}/actions/workflows"]))
          workflows = data.get("workflows", [])

          target = None
          for wf in workflows:
              name = (wf.get("name") or "").lower()
              path = (wf.get("path") or "").lower()
              if "ingest" in name or "ingestion" in name or "ingest" in path:
                  target = wf
                  break

          if not target:
              print("No ingestion workflow found")
              sys.exit(1)

          print(f"Triggering: {target.get('name')} ({target.get('path')})")
          subprocess.check_call(["gh","workflow","run",str(target["id"])])
          PY

      - name: Fail workflow if brain failed
        if: steps.run_brain.outcome != 'success'
        run: exit 1
