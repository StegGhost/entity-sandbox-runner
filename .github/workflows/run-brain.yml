name: Run Brain

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run brain
        id: run_brain
        continue-on-error: true
        run: python internal_brain/brain_runner.py

      - name: Show brain report
        if: always()
        run: cat internal_brain/brain_report.json

      - name: Persist brain artifacts and bundle mutations to repo
        if: always()
        run: |
          mkdir -p brain_reports

          cp internal_brain/brain_report.json brain_reports/brain_report_latest.json

          if [ -f payload/feedback/failed_bundle_report_correlation.json ]; then
            cp payload/feedback/failed_bundle_report_correlation.json brain_reports/failed_bundle_report_correlation.json
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add brain_reports/brain_report_latest.json
          git add brain_reports/failed_bundle_report_correlation.json || true
          git add incoming_bundles/ || true
          git add failed_bundles/ || true
          git add installed_bundles/ || true
          git add payload/feedback/ || true

          git commit -m "brain: persist latest artifacts and bundle mutations" || echo "no changes"
          git push

      - name: Trigger ingestion workflow
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run .github/workflows/ingestion.yml

      - name: Fail workflow if brain failed
        if: steps.run_brain.outcome != 'success'
        run: exit 1
