name: Run Brain

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run brain
        id: run_brain
        continue-on-error: true
        run: python internal_brain/brain_runner.py

      - name: Show brain report
        if: always()
        run: cat internal_brain/brain_report.json

      - name: Persist brain artifacts to repo
        if: always()
        run: |
          mkdir -p brain_reports

          cp internal_brain/brain_report.json brain_reports/brain_report_latest.json

          if [ -f payload/feedback/failed_bundle_report_correlation.json ]; then
            cp payload/feedback/failed_bundle_report_correlation.json brain_reports/failed_bundle_report_correlation.json
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add brain_reports/brain_report_latest.json

          if [ -f brain_reports/failed_bundle_report_correlation.json ]; then
            git add brain_reports/failed_bundle_report_correlation.json
          fi

          git commit -m "brain: persist latest artifacts" || echo "no changes"
          git push

      - name: Trigger ingestion workflow
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          repo = os.environ["REPO"]

          data = json.loads(
              subprocess.check_output(
                  ["gh", "api", f"/repos/{repo}/actions/workflows"],
                  text=True,
              )
          )

          workflows = data.get("workflows", [])
          target = None

          preferred_names = [
              "Ingestion Pipeline",
              "Forced Ingest and Evaluate",
          ]

          preferred_paths = [
              ".github/workflows/ingestion.yml",
              ".github/workflows/ingest.yml",
              ".github/workflows/ingestion-pipeline.yml",
          ]

          for wf in workflows:
              if wf.get("name") in preferred_names:
                  target = wf
                  break

          if target is None:
              for wf in workflows:
                  if wf.get("path") in preferred_paths:
                      target = wf
                      break

          if target is None:
              for wf in workflows:
                  name = (wf.get("name") or "").lower()
                  path = (wf.get("path") or "").lower()
                  if "ingest" in name or "ingestion" in name or "ingest" in path or "ingestion" in path:
                      target = wf
                      break

          if target is None:
              print("No ingestion workflow found.")
              print(json.dumps(workflows, indent=2))
              sys.exit(1)

          workflow_id = str(target["id"])
          print(f"Triggering workflow: {target.get('name')} ({target.get('path')}) [id={workflow_id}]")
          subprocess.check_call(["gh", "workflow", "run", workflow_id])
          PY

      - name: Fail workflow if brain failed
        if: steps.run_brain.outcome != 'success'
        run: exit 1
