name: Run Brain

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run brain
        id: run_brain
        continue-on-error: true
        run: python internal_brain/brain_runner.py

      - name: Show brain report
        if: always()
        run: cat internal_brain/brain_report.json

      - name: Trigger ingestion workflow
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          repo = os.environ["REPO"]

          def sh(cmd):
              return subprocess.check_output(cmd, text=True)

          data = json.loads(
              sh(
                  [
                      "gh",
                      "api",
                      f"/repos/{repo}/actions/workflows",
                  ]
              )
          )

          workflows = data.get("workflows", [])

          preferred_names = [
              "Ingestion Pipeline",
              "Forced Ingest and Evaluate",
          ]

          preferred_paths = [
              ".github/workflows/ingestion-pipeline.yml",
              ".github/workflows/ingest.yml",
              ".github/workflows/ingestion.yml",
          ]

          target = None

          for wf in workflows:
              if wf.get("name") in preferred_names:
                  target = wf
                  break

          if target is None:
              for wf in workflows:
                  if wf.get("path") in preferred_paths:
                      target = wf
                      break

          if target is None:
              for wf in workflows:
                  name = (wf.get("name") or "").lower()
                  path = (wf.get("path") or "").lower()
                  if "ingest" in name or "ingestion" in name or "ingest" in path or "ingestion" in path:
                      target = wf
                      break

          if target is None:
              print("No ingestion workflow found.")
              print(json.dumps(workflows, indent=2))
              sys.exit(1)

          workflow_id = str(target["id"])
          print(f"Triggering workflow: {target.get('name')} ({target.get('path')}) [id={workflow_id}]")

          subprocess.check_call(
              [
                  "gh",
                  "workflow",
                  "run",
                  workflow_id,
              ]
          )
          PY

      - name: Fail workflow if brain failed
        if: steps.run_brain.outcome != 'success'
        run: exit 1
