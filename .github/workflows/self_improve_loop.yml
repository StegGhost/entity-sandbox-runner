name: Self Improving Loop

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  self-improve:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force latest repo state
        run: |
          git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pytest httpx

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=${PYTHONPATH}:$(pwd):$(pwd)/install" >> $GITHUB_ENV

      # ----------------------------------------
      # CLEAN RECEIPTS (CRITICAL — SAME FIX)
      # ----------------------------------------
      - name: Clean receipts
        run: |
          rm -rf receipts receipts_node_a receipts_node_b || true
          mkdir -p receipts

      # ----------------------------------------
      # RUN TESTS + CAPTURE FAILURE
      # ----------------------------------------
      - name: Run tests (capture output)
        run: |
          python -m pytest -q > test_output.txt 2>&1 || true

      # ----------------------------------------
      # RUN SELF-IMPROVE (NOW FAILURE-AWARE)
      # ----------------------------------------
      - name: Run self-improve generator
        run: |
          python engine/self_improve_runner.py test_output.txt

      # ----------------------------------------
      # DEBUG OUTPUT
      # ----------------------------------------
      - name: Show generated bundles
        run: |
          echo "INCOMING_BUNDLES AFTER SELF-IMPROVE:"
          ls -la incoming_bundles || true

      # ----------------------------------------
      # COMMIT NEW BUNDLES
      # ----------------------------------------
      - name: Commit generated bundles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          git add incoming_bundles || true

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "self-improve: generated bundle from test failure"
            git push
          fi
