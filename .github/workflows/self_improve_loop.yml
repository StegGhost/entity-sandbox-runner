name: Autonomous Sandbox Loop

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  loop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt || true

      - run: echo "PYTHONPATH=${PYTHONPATH}:$(pwd)" >> $GITHUB_ENV

      - run: rm -rf receipts receipts_node_a receipts_node_b || true

      - name: Run baseline tests
        run: python -m pytest -q > test_output.txt 2>&1 || true

      - name: Run autonomous repair loop
        run: python engine/self_improve_runner.py test_output.txt

      - name: Output result
        run: cat brain_reports/apply_result.json || true

      - name: Commit if improved
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "auto: autonomous repair selection"
          git push
