name: Self Improving Loop

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  self-improve:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force latest repo state
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt || true

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${PYTHONPATH}:$(pwd)" >> $GITHUB_ENV

      - name: Clean receipts
        run: rm -rf receipts receipts_node_a receipts_node_b || true

      - name: Run focused sandbox tests
        run: python -m pytest -q > test_output.txt 2>&1 || true

      - name: Run self-improve FULL LOOP
        run: python engine/self_improve_runner.py test_output.txt

      - name: Show result
        run: cat brain_reports/apply_result.json || true

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "self-improve: autonomous repair"
          git push
