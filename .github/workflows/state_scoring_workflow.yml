name: State Scoring

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python install/state_scoring.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add payload/state_scoring payload/receipts/state_scoring || true
          git commit -m "state scoring update" || echo "no changes"
          git push
