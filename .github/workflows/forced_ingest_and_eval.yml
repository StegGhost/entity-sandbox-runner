name: Forced Ingest and Evaluate

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Manual only notice
        run: |
          echo "forced_ingest_and_eval.yml schedule disabled."
          echo "This workflow is no longer part of the live mutation path."
          echo "Authoritative live path is:"
          echo "Brain Sync -> Ingestion Pipeline -> Reconciliation"
          echo "Run this workflow manually only if explicitly needed."
