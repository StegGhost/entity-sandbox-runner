name: Observatory Smoke Test

on:
  workflow_dispatch:

jobs:
  observatory-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run experiment and build observatory timeline
        run: |
          python runner/orchestrator.py --experiment experiments/admissibility/simple_test
          python runner/build_all_artifacts.py --experiment simple_test
          python observatory/timeline_recorder.py || true
          python observatory/replay_engine.py || true

      - name: Upload observatory artifacts
        uses: actions/upload-artifact@v4
        with:
          name: observatory-artifacts
          path: |
            observatory
            reports
          if-no-files-found: warn
