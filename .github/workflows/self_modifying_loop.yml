name: Self Modifying Loop

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run self modifying loop
        run: |
          python install/self_modifying_loop.py

      - name: Show outputs
        run: |
          ls -R config || true

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add config || true
          git commit -m "self modifying loop update" || echo "no changes"
          git push
