name: Autonomous Loop

on:
  workflow_dispatch:

jobs:
  run-loop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Autonomous Loop
        run: python install/autonomous_loop_orchestrator.py
