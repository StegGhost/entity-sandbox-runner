name: Promote Staged Workflows

on:
  push:
    paths:
      - "payload/workflows/**"
      - "install/install_platform.py"
      - "install/unified_promotion_patch.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote-staged-workflows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Promote staged workflows
        run: |
          python install/unified_promotion_patch.py

      - name: Commit promoted workflows if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows || true
          if git diff --cached --quiet; then
            echo "No workflow changes to commit"
          else
            git commit -m "Promote staged workflows"
            git push
          fi
