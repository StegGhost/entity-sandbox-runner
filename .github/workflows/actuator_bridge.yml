name: Actuator Bridge

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run actuator bridge
        run: |
          python install/actuator_bridge.py

      - name: Show outputs
        run: |
          ls -R payload/actuation || true
          ls -R payload/receipts/actuator_bridge || true

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add payload/actuation payload/receipts/actuator_bridge || true
          git commit -m "actuator bridge update" || echo "no changes"
          git push
