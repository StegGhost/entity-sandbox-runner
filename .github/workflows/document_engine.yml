name: Document Engine

on:
  workflow_dispatch:
    inputs:
      doc_type:
        description: "Type of document"
        required: true
        type: choice
        options:
          - preprint
          - whitepaper
          - technical_spec
          - governance_model
      topic:
        description: "Topic"
        required: true
        type: string
      output_format:
        description: "Output format"
        required: true
        type: choice
        options:
          - md
          - md+tex
          - full_bundle
      bundle_target:
        description: "Target"
        required: true
        type: choice
        options:
          - ingestion
          - download_only

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show file structure
        run: |
          echo "==== ROOT ===="
          ls -R

      - name: Verify install exists
        run: |
          if [ ! -d "install" ]; then
            echo "ERROR: install/ folder missing"
            exit 1
          fi

      - name: Run Document Engine
        shell: bash
        run: |
          cat > /tmp/run_document_engine.py <<'PYEOF'
          import os
          import sys
          import traceback

          print("=== PYTHON START ===")
          print("CWD:", os.getcwd())
          print("ROOT FILES:", os.listdir())

          sys.path.append(os.getcwd())

          try:
              print("Importing install.document_pipeline ...")
              from install.document_pipeline import run
              print("Import success")

              print("Running pipeline ...")
              result = run(
                  "${{ inputs.doc_type }}",
                  "${{ inputs.topic }}",
                  "${{ inputs.output_format }}",
                  "incoming_bundles" if "${{ inputs.bundle_target }}" == "ingestion" else "."
              )

              print("SUCCESS RESULT:", result)

          except Exception as e:
              print("=== ERROR OCCURRED ===")
              print("ERROR:", str(e))
              traceback.print_exc()
              raise

          print("=== PYTHON END ===")
          PYEOF

          python /tmp/run_document_engine.py

      - name: Show outputs
        run: |
          echo "==== AFTER RUN ===="
          echo "-- incoming_bundles --"
          ls -R incoming_bundles || true
          echo "-- docs --"
          ls -R docs || true
          echo "-- repo root --"
          ls -R . || true

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git commit -m "document engine output" || echo "no changes"
          git push
