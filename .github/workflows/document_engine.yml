name: Document Engine

on:
  workflow_dispatch:
    inputs:
      doc_type:
        description: "Type of document"
        required: true
        type: choice
        options:
          - preprint
          - whitepaper
          - technical_spec
          - governance_model
      topic:
        description: "Topic"
        required: true
        type: string
      output_format:
        description: "Output format"
        required: true
        type: choice
        options:
          - md
          - md+tex
          - full_bundle
      bundle_target:
        description: "Target"
        required: true
        type: choice
        options:
          - ingestion
          - download_only

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug Repo State
        run: |
          echo "ROOT CONTENTS:"
          ls -R

      - name: Run Document Engine
        shell: bash
        run: |
          python - <<'EOF'
          import os
          import sys

          sys.path.append(os.getcwd())

          try:
              from install.document_pipeline import run

              result = run(
                  "${{ inputs.doc_type }}",
                  "${{ inputs.topic }}",
                  "${{ inputs.output_format }}",
                  "incoming_bundles" if "${{ inputs.bundle_target }}" == "ingestion" else "."
              )

              print("SUCCESS:", result)

          except Exception as e:
              print("ERROR:", str(e))
              raise
          EOF

      - name: Show output locations
        run: |
          echo "POST-RUN CONTENTS:"
          ls -R incoming_bundles || true
          ls -R . || true

      - name: Commit Output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git commit -m "document engine output" || echo "no changes"
          git push
