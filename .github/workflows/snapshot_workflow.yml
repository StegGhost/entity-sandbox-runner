name: Snapshot Workflow

on:
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 1. Lock system
      - name: Acquire lock
        run: python install/state_lock.py

      # 2. Validate system
      - name: Preflight
        run: python install/preflight_guard.py

      # 3. Execute system
      - name: Run orchestrator
        run: python install/autonomous_loop_orchestrator.py

      # 4. Verify snapshot quality
      - name: Verify snapshot
        run: python install/snapshot_verification.py

      # 5. Snapshot state
      - name: Rollback snapshot
        run: python install/rollback_engine.py

      # 6. Always release lock
      - name: Release lock
        if: always()
        run: python install/state_unlock.py

      # 7. Commit results
      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "snapshot run" || echo "no changes"
          git push
