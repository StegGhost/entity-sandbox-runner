name: Decision Engine Validation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "decision_engine.py"
      - "governed_executor.py"
      - "receipt_chain_verifier.py"
      - "state_reconstructor.py"
      - "state_hash.py"
      - "multi_node_verifier.py"
      - "weighted_consensus.py"
      - "api_server.py"
      - "test_decision_engine.py"
      - "test_api.py"
      - ".github/workflows/decision_engine.yml"

jobs:
  decision-engine-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pytest httpx

      - name: Clean receipts before API tests
        run: rm -rf receipts receipts_node_a receipts_node_b || true

      - name: Run API tests
        run: python -m pytest -q test_api.py

      - name: Clean receipts before decision engine tests
        run: rm -rf receipts receipts_node_a receipts_node_b || true

      - name: Run decision engine tests
        run: python test_decision_engine.py
