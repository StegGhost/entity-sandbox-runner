name: Decision Engine Validation

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  decision-engine-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Install API deps
        run: pip install fastapi uvicorn pytest

      - name: Run API tests
        run: python -m pytest test_api.py

      - name: Clean receipts
        run: rm -rf receipts receipts_node_a receipts_node_b || true

      - name: Run decision engine tests
        run: python test_decision_engine.py
