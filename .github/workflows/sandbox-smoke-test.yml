name: Sandbox Smoke Test

on:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run simple experiment
        run: |
          python runner/orchestrator.py --experiment experiments/admissibility/simple_test
          python runner/build_all_artifacts.py --experiment simple_test
          python run_visualizations.py
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-smoke-test-outputs
          path: |
            results
            reports
            receipts
            data_records
            manifests
