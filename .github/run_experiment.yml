name: Run Experiment

on:
  workflow_dispatch:
    inputs:
      experiment:
        description: "Experiment ID"
        required: true
        default: "critical_ratio_campaign"
      mode:
        description: "Run mode"
        required: true
        type: choice
        options:
          - single
          - parallel
          - adaptive_parallel
        default: single
      shards:
        description: "Shard count"
        required: false
        default: "8"
      runs_per_shard:
        description: "Runs per shard"
        required: false
        default: "50000"

permissions:
  contents: write

jobs:
  single-run:
    if: ${{ github.event.inputs.mode == 'single' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run single experiment
        run: |
          cd experiments/${{ github.event.inputs.experiment }}
          python run_experiment.py
      - name: Run validation
        run: |
          cd experiments/${{ github.event.inputs.experiment }}
          python validate_results.py
          python baselines.py
          python falsification_tests.py
          python visualize_phase_space.py
      - name: Build delivery artifacts
        run: |
          python result_delivery/build_run_manifest.py || true
          python result_delivery/build_standard_artifact_bundle.py || true
          python result_delivery/publish_demo_summary.py || true
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add experiments/${{ github.event.inputs.experiment }}/results || true
          git add experiments/${{ github.event.inputs.experiment }}/artifacts || true
          git add experiments/${{ github.event.inputs.experiment }}/published || true
          git commit -m "Experiment results for ${{ github.event.inputs.experiment }}" || echo "Nothing to commit"
          git push || echo "Push failed"

  parallel-run:
    if: ${{ github.event.inputs.mode == 'parallel' || github.event.inputs.mode == 'adaptive_parallel' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [0,1,2,3,4,5,6,7]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Prepare shard output path
        run: |
          mkdir -p experiments/${{ github.event.inputs.experiment }}/results/shards
      - name: Run shard
        run: |
          cd experiments/${{ github.event.inputs.experiment }}
          python run_experiment.py || true
          cp results/phase_space_map.json results/shards/shard_${{ matrix.shard }}.json || true
      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shard }}
          path: experiments/${{ github.event.inputs.experiment }}/results/shards/

  merge-results:
    if: ${{ github.event.inputs.mode == 'parallel' || github.event.inputs.mode == 'adaptive_parallel' }}
    needs: parallel-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: shard_results
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Merge shard outputs
        run: |
          python experiments/${{ github.event.inputs.experiment }}/merge_shards.py || true
      - name: Run validation after merge
        run: |
          cd experiments/${{ github.event.inputs.experiment }}
          python validate_results.py || true
          python baselines.py || true
          python falsification_tests.py || true
          python visualize_phase_space.py || true
      - name: Build delivery artifacts
        run: |
          python result_delivery/build_run_manifest.py || true
          python result_delivery/build_standard_artifact_bundle.py || true
          python result_delivery/publish_demo_summary.py || true
      - name: Commit merged results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add experiments/${{ github.event.inputs.experiment }}/results || true
          git add experiments/${{ github.event.inputs.experiment }}/artifacts || true
          git add experiments/${{ github.event.inputs.experiment }}/published || true
          git commit -m "Merged experiment results for ${{ github.event.inputs.experiment }}" || echo "Nothing to commit"
          git push || echo "Push failed"
