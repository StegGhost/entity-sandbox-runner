name: Run Evaluation

on:
  push:
    paths:
      - "install/**"
      - "experiments/evaluation_suite/**"
      - "payload/config/**"
      - ".github/workflows/run_evaluation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify entrypoint exists
        run: |
          test -f experiments/evaluation_suite/run_eval.py

      - name: Run evaluation
        run: |
          python experiments/evaluation_suite/run_eval.py
